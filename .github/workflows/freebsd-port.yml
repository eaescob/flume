name: FreeBSD Port

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.2.3)'
        required: true
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      FREEBSD_BUGZILLA_API_KEY:
        required: false

jobs:
  update-port:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          TAG="${{ inputs.version || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Update port version and crates
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^DISTVERSION=.*/DISTVERSION=\t${VERSION}/" packaging/freebsd/Makefile

          # Regenerate Makefile.crates from Cargo.lock
          python3 -c "
          import re
          with open('Cargo.lock') as f:
              content = f.read()
          packages = re.findall(r'\[\[package\]\]\nname = \"(.+?)\"\nversion = \"(.+?)\"', content)
          excluded = {'flume-core', 'flume-tui'}
          crates = sorted([f'{name}-{ver}' for name, ver in packages if name not in excluded])
          lines = ['CARGO_CRATES=\t' + crates[0] + ' \\\\']
          for c in crates[1:-1]:
              lines.append('\t\t' + c + ' \\\\')
          lines.append('\t\t' + crates[-1])
          print('\n'.join(lines))
          " > packaging/freebsd/Makefile.crates

      - name: Generate distinfo
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          bash packaging/freebsd/generate-distinfo.sh "${VERSION}"

      - name: Generate git-format patch
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TMPDIR=$(mktemp -d)
          mkdir -p "$TMPDIR/irc/flume"
          cp packaging/freebsd/Makefile packaging/freebsd/Makefile.crates packaging/freebsd/distinfo packaging/freebsd/pkg-descr packaging/freebsd/pkg-plist "$TMPDIR/irc/flume/"
          cd "$TMPDIR"
          git init -q
          git config user.name "Emilio A. Escobar"
          git config user.email "emilio@flumeirc.io"
          git add -A
          git commit -q -m "irc/flume: new port - Modern terminal IRC client v${VERSION}"
          git format-patch --stdout --root > "$GITHUB_WORKSPACE/flume-freebsd-port.patch"
          cd "$GITHUB_WORKSPACE"
          rm -rf "$TMPDIR"
          echo "Generated flume-freebsd-port.patch"

      - name: Upload patch artifact
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-port
          path: flume-freebsd-port.patch

      - name: Submit or update FreeBSD Bugzilla
        run: |
          API_KEY="${{ secrets.FREEBSD_BUGZILLA_API_KEY }}"
          if [ -z "$API_KEY" ]; then
            echo "FREEBSD_BUGZILLA_API_KEY not set, skipping Bugzilla submission"
            exit 0
          fi
          VERSION="${{ steps.version.outputs.version }}"
          BUGZILLA="https://bugs.freebsd.org/bugzilla/rest"
          PATCH_B64=$(base64 -w0 flume-freebsd-port.patch)

          # Search for existing flume port bug
          EXISTING=$(curl -s "${BUGZILLA}/bug?api_key=${API_KEY}&product=Ports%20%26%20Packages&component=Individual%20Port(s)&summary=irc%2Fflume&resolution=---" \
            | jq -r '.bugs[0].id // empty')

          if [ -n "$EXISTING" ]; then
            echo "Found existing bug #${EXISTING}, adding updated patch..."

            curl -s -X POST "${BUGZILLA}/bug/${EXISTING}/comment" \
              -H "Content-Type: application/json" \
              -d "{
                \"api_key\": \"${API_KEY}\",
                \"comment\": \"Updated port to version ${VERSION} (git-format patch).\"
              }"

            curl -s -X POST "${BUGZILLA}/bug/${EXISTING}/attachment" \
              -H "Content-Type: application/json" \
              -d "{
                \"api_key\": \"${API_KEY}\",
                \"ids\": [${EXISTING}],
                \"data\": \"${PATCH_B64}\",
                \"file_name\": \"flume-port-${VERSION}.patch\",
                \"summary\": \"git diff for irc/flume ${VERSION}\",
                \"content_type\": \"text/plain\",
                \"is_patch\": true
              }"

            echo "Updated bug #${EXISTING} with v${VERSION} patch"
          else
            echo "Creating new port submission bug..."

            RESULT=$(curl -s -X POST "${BUGZILLA}/bug" \
              -H "Content-Type: application/json" \
              -d "{
                \"api_key\": \"${API_KEY}\",
                \"product\": \"Ports & Packages\",
                \"component\": \"Individual Port(s)\",
                \"version\": \"Latest\",
                \"summary\": \"New port: irc/flume: Modern terminal IRC client\",
                \"description\": \"New port: irc/flume\\n\\nFlume is a fast, modern, terminal-based IRC client built in Rust.\\nMulti-server, IRCv3, Lua/Python scripting, theming, split views,\\nDCC, LLM generation, emoji shortcodes.\\n\\nHomepage: https://github.com/FlumeIRC/flume\\nLicense: Apache-2.0\\nVersion: ${VERSION}\",
                \"severity\": \"Affects Some People\"
              }")

            BUG_ID=$(echo "$RESULT" | jq -r '.id // empty')

            if [ -n "$BUG_ID" ]; then
              echo "Created bug #${BUG_ID}, attaching patch..."

              curl -s -X POST "${BUGZILLA}/bug/${BUG_ID}/attachment" \
                -H "Content-Type: application/json" \
                -d "{
                  \"api_key\": \"${API_KEY}\",
                  \"ids\": [${BUG_ID}],
                  \"data\": \"${PATCH_B64}\",
                  \"file_name\": \"flume-port-${VERSION}.patch\",
                  \"summary\": \"git diff for irc/flume ${VERSION}\",
                  \"content_type\": \"text/plain\",
                  \"is_patch\": true
                }"

              echo "Submitted new port bug #${BUG_ID}"
            else
              echo "Failed to create bug: $RESULT"
              exit 1
            fi
          fi
