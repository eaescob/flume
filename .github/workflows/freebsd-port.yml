name: FreeBSD Port

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.2.3)'
        required: true
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      FREEBSD_BUGZILLA_API_KEY:
        required: false

jobs:
  update-port:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          TAG="${{ inputs.version || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Update port version and crates
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^DISTVERSION=.*/DISTVERSION=\t${VERSION}/" packaging/freebsd/Makefile
          python3 packaging/freebsd/generate-makefile-crates.py > packaging/freebsd/Makefile.crates

      - name: Generate distinfo
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: bash packaging/freebsd/generate-distinfo.sh "${VERSION}"

      - name: Generate git-format patch
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          PATCHDIR=$(mktemp -d)
          mkdir -p "${PATCHDIR}/irc/flume"
          for f in Makefile Makefile.crates distinfo pkg-descr pkg-plist; do
            cp "packaging/freebsd/${f}" "${PATCHDIR}/irc/flume/"
          done
          cd "${PATCHDIR}"
          git init -q
          git config user.name "Emilio A. Escobar"
          git config user.email "emilio@flumeirc.io"
          git add -A
          git commit -q -m "irc/flume: new port v${VERSION}"
          git format-patch --stdout --root > "${GITHUB_WORKSPACE}/flume-freebsd-port.patch"
          rm -rf "${PATCHDIR}"

      - name: Upload patch artifact
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-port
          path: flume-freebsd-port.patch

      - name: Submit or update FreeBSD Bugzilla
        env:
          API_KEY: ${{ secrets.FREEBSD_BUGZILLA_API_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "${API_KEY}" ]; then
            echo "FREEBSD_BUGZILLA_API_KEY not set, skipping"
            exit 0
          fi
          BUGZILLA="https://bugs.freebsd.org/bugzilla/rest"
          PATCH_B64=$(base64 -w0 flume-freebsd-port.patch)

          EXISTING=$(curl -s "${BUGZILLA}/bug?api_key=${API_KEY}&product=Ports%20%26%20Packages&component=Individual%20Port(s)&summary=irc%2Fflume&resolution=---" \
            | jq -r '.bugs[0].id // empty')

          if [ -n "${EXISTING}" ]; then
            echo "Updating bug #${EXISTING}..."
            curl -s -X POST "${BUGZILLA}/bug/${EXISTING}/comment" \
              -H "Content-Type: application/json" \
              -d "{\"api_key\":\"${API_KEY}\",\"comment\":\"New upstream version ${VERSION} released. Attaching updated git-format patch with the latest source tarball, crate dependencies, and distinfo. This supersedes any previous patch on this bug — please use this latest one for review.\"}"
            curl -s -X POST "${BUGZILLA}/bug/${EXISTING}/attachment" \
              -H "Content-Type: application/json" \
              -d "{\"api_key\":\"${API_KEY}\",\"ids\":[${EXISTING}],\"data\":\"${PATCH_B64}\",\"file_name\":\"flume-port-${VERSION}.patch\",\"summary\":\"git diff for irc/flume ${VERSION}\",\"content_type\":\"text/plain\",\"is_patch\":true}"
            echo "Updated bug #${EXISTING}"
          else
            echo "Creating new bug..."
            RESULT=$(curl -s -X POST "${BUGZILLA}/bug" \
              -H "Content-Type: application/json" \
              -d "{\"api_key\":\"${API_KEY}\",\"product\":\"Ports & Packages\",\"component\":\"Individual Port(s)\",\"version\":\"Latest\",\"summary\":\"New port: irc/flume: Modern terminal IRC client\",\"description\":\"New port: irc/flume v${VERSION}\",\"severity\":\"Affects Some People\"}")
            BUG_ID=$(echo "${RESULT}" | jq -r '.id // empty')
            if [ -n "${BUG_ID}" ]; then
              curl -s -X POST "${BUGZILLA}/bug/${BUG_ID}/attachment" \
                -H "Content-Type: application/json" \
                -d "{\"api_key\":\"${API_KEY}\",\"ids\":[${BUG_ID}],\"data\":\"${PATCH_B64}\",\"file_name\":\"flume-port-${VERSION}.patch\",\"summary\":\"git diff for irc/flume ${VERSION}\",\"content_type\":\"text/plain\",\"is_patch\":true}"
              echo "Created bug #${BUG_ID}"
            else
              echo "Failed: ${RESULT}"
              exit 1
            fi
          fi
