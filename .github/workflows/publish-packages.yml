name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.2.2)'
        required: true
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      GPG_PRIVATE_KEY:
        required: true
      PACKAGES_TOKEN:
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          TAG="${{ inputs.version || github.ref_name }}"
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      # Import GPG key for signing
      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          gpg --list-keys packages@flumeirc.io

      # Download release binaries instead of rebuilding
      - name: Download release assets
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p binaries

          # Download and extract Linux binaries from the release
          gh release download "v${VERSION}" -p "flume-x86_64-unknown-linux-gnu.tar.gz" -D binaries/
          gh release download "v${VERSION}" -p "flume-aarch64-unknown-linux-gnu.tar.gz" -D binaries/

          mkdir -p binaries/amd64 binaries/arm64
          tar xzf binaries/flume-x86_64-unknown-linux-gnu.tar.gz -C binaries/amd64
          tar xzf binaries/flume-aarch64-unknown-linux-gnu.tar.gz -C binaries/arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Install nfpm for building deb and rpm packages
      - name: Install nfpm
        run: |
          curl -sfL https://github.com/goreleaser/nfpm/releases/download/v2.41.1/nfpm_2.41.1_Linux_x86_64.tar.gz | tar xz -C /usr/local/bin nfpm

      # Generate nfpm config and build packages for both architectures
      - name: Build packages
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # Prepare compressed man page
          gzip -9 -k doc/flume.1

          for ARCH_PAIR in "amd64:amd64:x86_64" "arm64:arm64:aarch64"; do
            DEB_ARCH=$(echo $ARCH_PAIR | cut -d: -f1)
            DIR_ARCH=$(echo $ARCH_PAIR | cut -d: -f2)
            RPM_ARCH=$(echo $ARCH_PAIR | cut -d: -f3)

            cat > nfpm-${DEB_ARCH}.yaml <<EOF
          name: flume
          arch: ${DEB_ARCH}
          version: ${VERSION}
          maintainer: Emilio A. Escobar <emilio@flumeirc.io>
          description: Modern terminal IRC client
          homepage: https://github.com/FlumeIRC/flume
          license: Apache-2.0
          contents:
            - src: binaries/${DIR_ARCH}/flume
              dst: /usr/bin/flume
              file_info:
                mode: 0755
            - src: doc/flume.1.gz
              dst: /usr/share/man/man1/flume.1.gz
            - src: LICENSE
              dst: /usr/share/doc/flume/LICENSE
          rpm:
            group: Applications/Internet
          EOF

            nfpm package -f nfpm-${DEB_ARCH}.yaml -p deb -t "target/flume_${VERSION}_${DEB_ARCH}.deb"
            nfpm package -f nfpm-${DEB_ARCH}.yaml -p rpm -t "target/flume-${VERSION}-1.${RPM_ARCH}.rpm"

            # Sign the RPM
            echo "%_gpg_name packages@flumeirc.io" > ~/.rpmmacros
            rpmsign --addsign "target/flume-${VERSION}-1.${RPM_ARCH}.rpm" || echo "rpmsign not available, skipping RPM signing"
          done

      # ── Clone packages repo ──
      - name: Checkout packages repo
        uses: actions/checkout@v4
        with:
          repository: FlumeIRC/packages
          token: ${{ secrets.PACKAGES_TOKEN }}
          path: packages-repo

      # ── Update APT repository ──
      - name: Update APT repo
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cd packages-repo
          mkdir -p apt/pool/main
          mkdir -p apt/dists/stable/main/binary-amd64
          mkdir -p apt/dists/stable/main/binary-arm64

          # Copy .debs
          cp ../target/flume_${VERSION}_amd64.deb apt/pool/main/
          cp ../target/flume_${VERSION}_arm64.deb apt/pool/main/

          # Generate Packages files
          cd apt
          dpkg-scanpackages pool/main /dev/null > dists/stable/main/binary-amd64/Packages
          gzip -9c dists/stable/main/binary-amd64/Packages > dists/stable/main/binary-amd64/Packages.gz

          cp dists/stable/main/binary-amd64/Packages dists/stable/main/binary-arm64/Packages
          cp dists/stable/main/binary-amd64/Packages.gz dists/stable/main/binary-arm64/Packages.gz

          # Generate Release file
          cd dists/stable
          cat > Release <<RELEASE
          Origin: FlumeIRC
          Label: FlumeIRC
          Suite: stable
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          Description: Flume IRC client packages
          RELEASE
          sed -i 's/^          //' Release

          # Sign Release file
          gpg --batch --yes --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes --clearsign -o InRelease Release
          cd ../../../

      # ── Update RPM repository ──
      - name: Update RPM repo
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cd packages-repo
          mkdir -p rpm/packages/x86_64
          mkdir -p rpm/packages/aarch64

          # Copy RPMs
          cp ../target/flume-${VERSION}-1.x86_64.rpm rpm/packages/x86_64/
          cp ../target/flume-${VERSION}-1.aarch64.rpm rpm/packages/aarch64/

          # Create repo metadata
          sudo apt-get install -y createrepo-c
          createrepo_c rpm/

          # Sign repo metadata
          gpg --batch --yes --armor --detach-sign -o rpm/repodata/repomd.xml.asc rpm/repodata/repomd.xml

      # ── Create index and GPG key page ──
      - name: Create index page
        run: |
          cd packages-repo
          mkdir -p gpg

          # Export public key
          gpg --armor --export packages@flumeirc.io > gpg/flume-signing-key.asc

          # Create repo config for dnf/yum
          cat > rpm/flume.repo <<'REPO'
          [flume]
          name=Flume IRC Client
          baseurl=https://pkg.flumeirc.io/rpm/
          enabled=1
          gpgcheck=1
          gpgkey=https://pkg.flumeirc.io/gpg/flume-signing-key.asc
          REPO
          sed -i 's/^          //' rpm/flume.repo

          # Create index.html
          cat > index.html <<'HTML'
          <!DOCTYPE html>
          <html>
          <head><title>Flume Packages</title></head>
          <body>
          <h1>Flume IRC Client — Package Repository</h1>
          <h2>Debian / Ubuntu</h2>
          <pre>
          curl -fsSL https://pkg.flumeirc.io/gpg/flume-signing-key.asc | sudo gpg --dearmor -o /usr/share/keyrings/flume.gpg
          echo "deb [signed-by=/usr/share/keyrings/flume.gpg] https://pkg.flumeirc.io/apt stable main" | sudo tee /etc/apt/sources.list.d/flume.list
          sudo apt update && sudo apt install flume
          </pre>
          <h2>Fedora / RHEL / CentOS</h2>
          <pre>
          sudo dnf config-manager --add-repo https://pkg.flumeirc.io/rpm/flume.repo
          sudo dnf install flume
          </pre>
          <h2>GPG Key</h2>
          <p><a href="/gpg/flume-signing-key.asc">Download signing key</a></p>
          </body>
          </html>
          HTML
          sed -i 's/^          //' index.html

      # ── Push to packages repo ──
      - name: Push packages
        run: |
          cd packages-repo
          git config user.name "FlumeIRC Bot"
          git config user.email "packages@flumeirc.io"
          git add -A
          git commit -m "Update packages to ${{ steps.version.outputs.version }}" || echo "No changes"
          git push
