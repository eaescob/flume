name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: flume-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-latest
            name: flume-x86_64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: flume-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: flume-aarch64-unknown-linux-gnu
            use_cross: true
          - target: x86_64-unknown-freebsd
            os: ubuntu-latest
            name: flume-x86_64-unknown-freebsd
            use_cross: true

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        run: |
          FEATURES=""
          BUILD_CMD="cargo"
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            BUILD_CMD="cross"
          else
            # Enable Python on native builds (abi3 makes it portable across Python versions)
            if python3 -c "import sysconfig; print(sysconfig.get_path('include'))" 2>/dev/null; then
              echo "Python detected, enabling python feature (abi3 stable ABI)"
              FEATURES="--features python"
            fi
          fi
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 $BUILD_CMD build --release --target ${{ matrix.target }} -p flume-tui $FEATURES

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz flume
          cd ../../..
          shasum -a 256 ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.tar.gz.sha256

  deb:
    strategy:
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-gnu
          - arch: arm64
            target: aarch64-unknown-linux-gnu
            use_cross: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        run: |
          FEATURES=""
          BUILD_CMD="cargo"
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            BUILD_CMD="cross"
          else
            if python3 -c "import sysconfig; print(sysconfig.get_path('include'))" 2>/dev/null; then
              FEATURES="--features python"
            fi
          fi
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 $BUILD_CMD build --release --target ${{ matrix.target }} -p flume-tui $FEATURES
          # Copy binary to target/release/ so build-deb.sh finds it
          cp target/${{ matrix.target }}/release/flume target/release/flume 2>/dev/null || mkdir -p target/release && cp target/${{ matrix.target }}/release/flume target/release/flume

      - name: Build .deb
        run: |
          chmod +x packaging/deb/build-deb.sh
          ARCH=${{ matrix.arch }} bash packaging/deb/build-deb.sh

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: flume-deb-${{ matrix.arch }}
          path: target/*.deb

  release:
    needs: [build, deb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate FreeBSD port shar
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^DISTVERSION=.*/DISTVERSION=\t${VERSION}/" packaging/freebsd/Makefile

          # Regenerate Makefile.crates from Cargo.lock
          python3 -c "
          import re
          with open('Cargo.lock') as f:
              content = f.read()
          packages = re.findall(r'\[\[package\]\]\nname = \"(.+?)\"\nversion = \"(.+?)\"', content)
          excluded = {'flume-core', 'flume-tui'}
          crates = sorted([f'{name}-{ver}' for name, ver in packages if name not in excluded])
          lines = ['CARGO_CRATES=\t' + crates[0] + ' \\\\']
          for c in crates[1:-1]:
              lines.append('\t\t' + c + ' \\\\')
          lines.append('\t\t' + crates[-1])
          print('\n'.join(lines))
          " > packaging/freebsd/Makefile.crates
          cd packaging/freebsd
          {
            echo '#!/bin/sh'
            echo '# Shell archive for FreeBSD port: irc/flume'
            echo '# Extract with: sh flume-port.shar'
            echo ''
            for f in Makefile Makefile.crates pkg-descr pkg-plist; do
              echo "echo x - $f"
              echo "sed 's/^X//' > '$f' << 'SHAR_END_$f'"
              sed 's/^/X/' "$f"
              echo "SHAR_END_$f"
            done
          } > ../../artifacts/flume-port.shar

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
            artifacts/**/*.deb
            artifacts/flume-port.shar

  publish-packages:
    needs: [release]
    uses: ./.github/workflows/publish-packages.yml
    with:
      version: ${{ github.ref_name }}
    secrets:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

  publish-homebrew:
    needs: [release]
    uses: ./.github/workflows/homebrew.yml
    with:
      version: ${{ github.ref_name }}
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  publish-aur:
    needs: [release]
    uses: ./.github/workflows/aur.yml
    with:
      version: ${{ github.ref_name }}
    secrets:
      AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}

  freebsd-port:
    needs: [release]
    uses: ./.github/workflows/freebsd-port.yml
    with:
      version: ${{ github.ref_name }}
    secrets:
      FREEBSD_BUGZILLA_API_KEY: ${{ secrets.FREEBSD_BUGZILLA_API_KEY }}
